name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../chirp-${{ matrix.target }}.tar.gz chirp
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chirp-${{ matrix.target }}
          path: chirp-${{ matrix.target }}.tar.gz

  universal-macos:
    needs: build
    runs-on: macos-latest
    steps:
      - name: Download x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: chirp-x86_64-apple-darwin

      - name: Download aarch64 binary
        uses: actions/download-artifact@v4
        with:
          name: chirp-aarch64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p x86_64 aarch64
          tar xzf chirp-x86_64-apple-darwin.tar.gz -C x86_64
          tar xzf chirp-aarch64-apple-darwin.tar.gz -C aarch64
          lipo -create -output chirp x86_64/chirp aarch64/chirp
          tar czf chirp-universal-apple-darwin.tar.gz chirp

      - name: Upload universal artifact
        uses: actions/upload-artifact@v4
        with:
          name: chirp-universal-apple-darwin
          path: chirp-universal-apple-darwin.tar.gz

  release:
    needs: [build, universal-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            chirp-universal-apple-darwin.tar.gz
            chirp-x86_64-unknown-linux-gnu.tar.gz
            chirp-x86_64-apple-darwin.tar.gz
            chirp-aarch64-apple-darwin.tar.gz

  ci:
    # Runs on every push/PR, not just tags
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: cargo test
